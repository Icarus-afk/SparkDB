services:
  sparkdb:
    build: .
    ports:
      - "9600:9600"
    volumes:
      - sparkdb-data:/data
      - sparkdb-backups:/backups
      - ./config.json:/etc/sparkdb/config.json:ro
    environment:
      - SPARKDB_DATABASE_DATA_DIR=/data
      - SPARKDB_DATABASE_WAL_MODE=true
      - SPARKDB_AUTH_ENABLED=true
      - SPARKDB_BACKUP_DIR=/backups
      - SPARKDB_BACKUP_KEEP_COUNT=10
    env_file:
      - .env
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp

volumes:
  sparkdb-data:
  sparkdb-backups:
